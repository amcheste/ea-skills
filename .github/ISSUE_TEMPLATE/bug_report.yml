name: Bug Report
description: A skill behaved unexpectedly or produced incorrect output
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: input
    id: skill
    attributes:
      label: Skill
      description: Which skill triggered the bug? (e.g. `daily-note`, `inbox-triage`)
      placeholder: e.g. weekly-review
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run `/ea-agent:<skill>`
        2. Provide input: ...
        3. Expected: ...
        4. Actual: ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Plugin Version
      description: From `.claude-plugin/plugin.json` → `version`
      placeholder: e.g. 1.1.0
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Relevant Claude model, OS, vault structure, or anything else that might help.
