name: Feature Request
description: Suggest a new skill or improvement to an existing one
labels: ['feat']
body:
  - type: markdown
    attributes:
      value: |
        Got an idea for a new skill or a way to improve an existing one? We'd love to hear it.

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - New skill
        - Improvement to existing skill
        - New integration (tool / app)
        - Other
    validations:
      required: true

  - type: input
    id: skill
    attributes:
      label: Skill (if improving an existing one)
      placeholder: e.g. inbox-triage
    validations:
      required: false

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this solve? What's missing today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should the skill or feature work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've thought about?
    validations:
      required: false
