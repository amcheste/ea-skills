version: 2
updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    target-branch: develop
    commit-message:
      prefix: chore
    labels:
      - dependencies

  # Python (evals)
  - package-ecosystem: pip
    directory: /evals
    schedule:
      interval: weekly
      day: monday
    target-branch: develop
    commit-message:
      prefix: chore
    labels:
      - dependencies
