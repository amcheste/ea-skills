name: Release Drafter

on:
  push:
    branches: [develop]

permissions:
  contents: write
  pull-requests: read

jobs:
  draft:
    name: Draft Release Notes
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@563bf132657a13ded0b01fcb723c5a58cdd824e2 # v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
