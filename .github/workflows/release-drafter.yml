name: Release Drafter

on:
  push:
    branches: [develop]

permissions:
  contents: write
  pull-requests: read

jobs:
  draft:
    name: Draft Release Notes
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@a6acf82562eee06318b77ab8cb0b11ed81c677a7 # v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
