name: Release Drafter

on:
  push:
    branches: [develop]

permissions:
  contents: write
  pull-requests: read

jobs:
  draft:
    name: Draft Release Notes
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@5de93583980a40bd78603b6dfdcda5b4df377b32 # v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
