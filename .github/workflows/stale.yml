name: Stale

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark Stale Issues and PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f # v10
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            any activity in the last 60 days. It will be closed in 7 days if no
            further activity occurs.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not had
            any activity in the last 30 days. It will be closed in 7 days if no
            further activity occurs.
          close-issue-message: 'Closing due to inactivity. Feel free to reopen if still relevant.'
          close-pr-message: 'Closing due to inactivity. Feel free to reopen if still relevant.'
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'pinned,security'
          exempt-pr-labels: 'pinned,security'
