# Routing Evals
#
# Each scenario verifies that a user phrase triggers the correct skill.
# The eval runner loads all skill descriptions and asks Claude to classify
# the phrase — testing whether descriptions are clear and distinct.

# ── setup ────────────────────────────────────────────────────────────────────
- phrase: "Set up my EA"
  expected_skill: setup

- phrase: "I just installed the EA agent, what do I do first?"
  expected_skill: setup

- phrase: "Update my EA profile"
  expected_skill: setup

